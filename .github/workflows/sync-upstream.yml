name: Sync Upstream to dev-original

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force_pr:
        description: 'Force PR creation even if no new commits'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync upstream/main → dev-original
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history required for accurate diff and commit counts
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve upstream URL via GitHub API
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPSTREAM_URL=$(gh api repos/${{ github.repository }} --jq '.parent.clone_url')
          if [ -z "$UPSTREAM_URL" ] || [ "$UPSTREAM_URL" = "null" ]; then
            echo "ERROR: This repository has no parent — not a fork. Exiting."
            exit 1
          fi
          echo "upstream_url=$UPSTREAM_URL" >> "$GITHUB_OUTPUT"
          echo "Upstream remote: $UPSTREAM_URL"

      - name: Fetch upstream/main
        run: |
          git fetch "${{ steps.upstream.outputs.upstream_url }}" main:refs/remotes/upstream/main
          echo "upstream/main HEAD: $(git rev-parse --short upstream/main)"

      - name: Force-push upstream/main → dev-original
        run: |
          git push origin upstream/main:refs/heads/dev-original --force
          echo "dev-original updated to $(git rev-parse --short upstream/main)"

      - name: Count new commits vs dev
        id: diff
        run: |
          git fetch origin dev 2>/dev/null || true
          if git rev-parse --verify origin/dev >/dev/null 2>&1; then
            NEW=$(git rev-list --count origin/dev..upstream/main)
            BEHIND=$(git rev-list --count upstream/main..origin/dev)
          else
            NEW=1
            BEHIND=0
          fi
          echo "new_vs_dev=$NEW" >> "$GITHUB_OUTPUT"
          echo "commits_behind=$BEHIND" >> "$GITHUB_OUTPUT"
          echo "New in upstream not in dev: $NEW | sloperators-only: $BEHIND"

      - name: Build PR body
        id: body
        if: steps.diff.outputs.new_vs_dev != '0' || inputs.force_pr == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPSTREAM_REPO=$(gh api repos/${{ github.repository }} --jq '.parent.full_name')
          if git rev-parse --verify origin/dev >/dev/null 2>&1; then
            LOG=$(git log --oneline --no-merges origin/dev..upstream/main | head -50)
            STAT=$(git diff --stat origin/dev...upstream/main | tail -1)
          else
            LOG=$(git log --oneline --no-merges upstream/main | head -50)
            STAT="(first sync — full upstream history)"
          fi
          {
            echo "upstream_repo=$UPSTREAM_REPO"
            echo "log<<LOG_EOF"
            echo "$LOG"
            echo "LOG_EOF"
            echo "stat=$STAT"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update PR (dev-original → dev)
        if: steps.diff.outputs.new_vs_dev != '0' || inputs.force_pr == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW: ${{ steps.diff.outputs.new_vs_dev }}
          BEHIND: ${{ steps.diff.outputs.commits_behind }}
          UPSTREAM_REPO: ${{ steps.body.outputs.upstream_repo }}
          LOG: ${{ steps.body.outputs.log }}
          STAT: ${{ steps.body.outputs.stat }}
        run: |
          TITLE="chore(sync): ${NEW} new upstream commit(s) from ${UPSTREAM_REPO}"
          BODY="## Upstream Sync — \`dev-original\` → \`dev\`

**Source**: [\`${UPSTREAM_REPO}\`](https://github.com/${UPSTREAM_REPO})
**New commits (upstream → dev)**: ${NEW} | **sloperators-only commits**: ${BEHIND}

### New commits from upstream
\`\`\`
${LOG}
\`\`\`

### Files changed
${STAT}

---
> Auto-created by the \`sync-upstream\` GitHub Actions workflow.
> Review the diff carefully before merging — resolve any conflicts manually.
> After merging: promote through \`dev\` → \`stage\` → \`main\` via standard PRs."

          EXISTING=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head dev-original --base dev --state open \
            --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            gh pr edit "$EXISTING" --title "$TITLE" --body "$BODY"
            echo "Updated existing PR #$EXISTING"
          else
            gh pr create \
              --head dev-original --base dev \
              --title "$TITLE" \
              --body "$BODY" || true
            echo "Created new PR"
          fi

      - name: Already in sync
        if: steps.diff.outputs.new_vs_dev == '0' && inputs.force_pr != 'true'
        run: |
          echo "dev-original and dev are already in sync with upstream/main."
          echo "No PR needed."
